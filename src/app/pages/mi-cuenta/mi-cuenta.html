<div class="container py-5" *ngIf="usuario">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow border-0">
        <div class="card-header text-white text-center py-4"
          [ngStyle]="{'background': 'linear-gradient(135deg, #001f5b, #003399)'}">
          <h4 class="mb-0" [ngStyle]="{'font-family': '\'Bebas Neue\', sans-serif', 'letter-spacing': '2px'}">
            {{ 'mi cuenta' | uppercase }}
          </h4>
        </div>
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <div class="avatar-circle mx-auto d-flex align-items-center justify-content-center"
              [ngStyle]="{'background-color': '#001f5b', 'color': 'white'}">
              {{ usuario.nombre[0] }}
            </div>
            <h5 class="mt-3 fw-bold" [ngStyle]="{'color': '#001f5b'}">{{ usuario.nombre }}</h5>
            <span class="badge px-3 py-2" [ngStyle]="{'background-color': '#001f5b', 'font-size': '0.8rem'}">
              {{ usuario.rol }}
            </span>
          </div>

          <table class="table table-bordered mb-4">
            <tbody>
              <tr>
                <th class="text-muted small text-uppercase" style="width: 35%">Nombre</th>
                <td>{{ usuario.nombre }}</td>
              </tr>
              <tr>
                <th class="text-muted small text-uppercase">Correo</th>
                <td>{{ usuario.correo }}</td>
              </tr>
              <tr>
                <th class="text-muted small text-uppercase">Rol</th>
                <td>{{ usuario.rol }}</td>
              </tr>
            </tbody>
          </table>

          <div class="d-grid gap-2">
            <a routerLink="/dashboard" class="btn text-white" [ngStyle]="{'background-color': '#001f5b'}">
              Ir al Dashboard
            </a>
            <button class="btn btn-outline-danger" (click)="cerrarSesion()">
              Cerrar Sesión
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
